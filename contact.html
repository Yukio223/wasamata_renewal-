  <!-- ========== お問い合わせフォームセクション ========== -->
  <section class="about" id="contact">
    <div class="container" style="max-width: 900px; margin: 0 auto; padding: 80px 20px;">
      <div class="section-label fade-up">Contact</div>
      <h2 class="section-title fade-up">お問い合わせ</h2>

      <div class="about-intro fade-up" style="margin-bottom: 48px;">
        <p>WASAMATA HUTTEへのご質問、ご不明な点、ご予約に関するお問い合わせはこちらのフォームからお気軽にお送りください。</p>
      </div>

      <div style="margin: 48px 0; max-width: 700px;">
        <form style="display: grid; gap: 32px;">
          <!-- お名前 -->
          <div>
            <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600;">
              <span style="background: #8b4513; color: white; padding: 4px 8px; border-radius: 2px; font-size: 0.85rem;">必須</span>
              <span>お名前</span>
              <span style="font-size: 0.9rem; color: #666;">※全角で入力してください</span>
            </label>
            <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center;">
              <input type="text" placeholder="姓" style="padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;" required>
              <span>　</span>
              <input type="text" placeholder="名" style="padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;" required>
            </div>
          </div>

          <!-- フリガナ -->
          <div>
            <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600;">
              <span style="background: #8b4513; color: white; padding: 4px 8px; border-radius: 2px; font-size: 0.85rem;">必須</span>
              <span>フリガナ</span>
              <span style="font-size: 0.9rem; color: #666;">※カタカナで入力してください</span>
            </label>
            <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center;">
              <input type="text" placeholder="セイ" style="padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;" required>
              <span>　</span>
              <input type="text" placeholder="メイ" style="padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;" required>
            </div>
          </div>

          <!-- メールアドレス -->
          <div>
            <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600;">
              <span style="background: #8b4513; color: white; padding: 4px 8px; border-radius: 2px; font-size: 0.85rem;">必須</span>
              <span>メールアドレス</span>
            </label>
            <input type="email" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;" required>
          </div>

          <!-- メールアドレス確認 -->
          <div>
            <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600;">
              <span style="background: #8b4513; color: white; padding: 4px 8px; border-radius: 2px; font-size: 0.85rem;">必須</span>
              <span>メールアドレス（確認）</span>
            </label>
            <input type="email" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;" required>
            <small style="color: #666; margin-top: 4px; display: block;">（メールアドレス確認のため再度入力をお願いします）</small>
          </div>

          <!-- 連絡先電話番号 -->
          <div>
            <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600;">
              <span style="color: #999; padding: 4px 8px; border-radius: 2px; font-size: 0.85rem;">任意</span>
              <span>連絡先電話番号</span>
            </label>
            <input type="tel" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
          </div>

          <!-- 問い合わせ内容のカテゴリ -->
          <div>
            <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600;">
              <span style="background: #8b4513; color: white; padding: 4px 8px; border-radius: 2px; font-size: 0.85rem;">必須</span>
              <span>問い合わせ内容のカテゴリ</span>
            </label>
            <select style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;" required>
              <option value="">選択してください</option>
              <option value="reservation">予約に関して</option>
              <option value="facility">施設について</option>
              <option value="other">その他</option>
            </select>
          </div>

          <!-- 宿泊予定日 -->
          <div>
            <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600;">
              <span style="color: #999; padding: 4px 8px; border-radius: 2px; font-size: 0.85rem;">任意</span>
              <span>宿泊予定日</span>
            </label>
            <input type="date" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
          </div>

          <!-- 宿泊人数 -->
          <div>
            <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600;">
              <span style="color: #999; padding: 4px 8px; border-radius: 2px; font-size: 0.85rem;">任意</span>
              <span>宿泊人数</span>
            </label>
            <input type="number" min="1" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;" placeholder="人数を入力してください">
          </div>

          <!-- お問い合わせ内容 -->
          <div>
            <label style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600;">
              <span style="background: #8b4513; color: white; padding: 4px 8px; border-radius: 2px; font-size: 0.85rem;">必須</span>
              <span>お問い合わせ内容</span>
            </label>
            <textarea style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; min-height: 180px; resize: vertical;" placeholder="お問い合わせ内容を入力してください" required></textarea>
          </div>

          <!-- 送信ボタン -->
          <div style="text-align: center; margin-top: 24px;">
            <button type="submit" style="padding: 16px 48px; background: #5a4a3a; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.3s;">
              送信する
            </button>
          </div>
        </form>
      </div>
    </div>
